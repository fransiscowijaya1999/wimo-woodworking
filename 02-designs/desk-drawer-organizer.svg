<svg xmlns="http://www.w3.org/2000/svg" width="820" height="485" viewBox="0 0 820 485" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <!-- ================= Desk-side stationary drawer organizer ================= -->
  <!-- Scale: 8 px = 1 cm. Standalone box sitting in a 28 cm-tall x 30 cm-deep shelf opening. -->
  <!-- Carcass: 12 mm plywood, glued dados. Drawers on 200 mm zinc ball-bearing side slides. -->
  <!-- Front elevation: 3 drawer fronts TILE the full 20 cm face (equal reveals, no dead space). -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#444" stroke-width="1.1"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="485" fill="#ffffff"/>
  <text x="24" y="30" font-size="18" font-weight="700" fill="#222">Desk-side Stationary Drawer Organizer</text>
  <text x="24" y="50" font-size="12" fill="#666">External 24 cm W &#215; 25 cm D &#215; 20 cm H &#183; fits 28 cm-tall &#215; 30 cm-deep shelf opening &#183; carcass 12 mm plywood &#183; scale 8 px = 1 cm</text>

  <!-- ===================== PANEL A: FRONT ELEVATION ===================== -->
  <text x="90" y="74" font-size="13" font-weight="700" fill="#333">Front elevation (as you face it)</text>

  <!-- carcass outer box: 24 cm x 20 cm = 192 x 160 px, top-left (90,84) -->
  <rect x="90" y="84" width="192" height="160" fill="#f4ecdf" stroke="#7a5c33" stroke-width="2"/>
  <!-- 12 mm ply panels shown shaded: top / bottom / left wall / right wall -->
  <rect x="90"  y="84"  width="192" height="10"  fill="#e7d7bf" stroke="#7a5c33" stroke-width="0.6"/>
  <rect x="90"  y="234" width="192" height="10"  fill="#e7d7bf" stroke="#7a5c33" stroke-width="0.6"/>
  <rect x="90"  y="84"  width="10"  height="160" fill="#e7d7bf" stroke="#7a5c33" stroke-width="0.6"/>
  <rect x="272" y="84"  width="10"  height="160" fill="#e7d7bf" stroke="#7a5c33" stroke-width="0.6"/>

  <!-- Drawer 1 front: y 97..137 (40 px = 5.0 cm front) -->
  <rect x="103" y="97" width="166" height="40" rx="3" fill="#fbf7ef" stroke="#9c7b46" stroke-width="1.5"/>
  <ellipse cx="186" cy="106" rx="12" ry="3" fill="#cdb78f" stroke="#b59a6a" stroke-width="0.8"/>
  <text x="186" y="122" font-size="11" font-weight="600" fill="#333" text-anchor="middle">Drawer 1</text>
  <text x="186" y="133" font-size="8.5" fill="#666" text-anchor="middle">pens &#183; refills &#183; cutter + blades</text>

  <!-- Drawer 2 front: y 140..188 (48 px = 6.0 cm front) -->
  <rect x="103" y="140" width="166" height="48" rx="3" fill="#fbf7ef" stroke="#9c7b46" stroke-width="1.5"/>
  <ellipse cx="186" cy="149" rx="12" ry="3" fill="#cdb78f" stroke="#b59a6a" stroke-width="0.8"/>
  <text x="186" y="166" font-size="11" font-weight="600" fill="#333" text-anchor="middle">Drawer 2</text>
  <text x="186" y="178" font-size="8.5" fill="#666" text-anchor="middle">PH2 screwdriver &#183; 7&quot; pliers</text>

  <!-- Drawer 3 front: y 191..231 (40 px = 5.0 cm front) -->
  <rect x="103" y="191" width="166" height="40" rx="3" fill="#fbf7ef" stroke="#9c7b46" stroke-width="1.5"/>
  <ellipse cx="186" cy="200" rx="12" ry="3" fill="#cdb78f" stroke="#b59a6a" stroke-width="0.8"/>
  <text x="186" y="215" font-size="11" font-weight="600" fill="#333" text-anchor="middle">Drawer 3</text>
  <text x="186" y="226" font-size="8.5" fill="#666" text-anchor="middle">receipts &#183; stamps (laid flat)</text>

  <!-- overall height dimension (outermost, x=40) -->
  <line x1="40" y1="84" x2="40" y2="244" stroke="#444" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="30" y="164" font-size="10" fill="#444" text-anchor="middle" transform="rotate(-90 30 164)">20 cm overall</text>

  <!-- per-drawer front-height ladder (x=70) -->
  <line x1="70" y1="97"  x2="70" y2="137" stroke="#777" stroke-width="0.9" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="60" y="117" font-size="9" fill="#666" text-anchor="middle" transform="rotate(-90 60 117)">5.0 cm</text>
  <line x1="70" y1="140" x2="70" y2="188" stroke="#777" stroke-width="0.9" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="60" y="164" font-size="9" fill="#666" text-anchor="middle" transform="rotate(-90 60 164)">6.0 cm</text>
  <line x1="70" y1="191" x2="70" y2="231" stroke="#777" stroke-width="0.9" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="60" y="211" font-size="9" fill="#666" text-anchor="middle" transform="rotate(-90 60 211)">5.0 cm</text>

  <!-- width dimension -->
  <line x1="90" y1="258" x2="282" y2="258" stroke="#444" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="186" y="272" font-size="10" fill="#444" text-anchor="middle">24 cm wide</text>
  <text x="186" y="285" font-size="8.5" fill="#999" text-anchor="middle">(&#8776; 17 cm usable inside drawer, after walls + slides)</text>

  <!-- ===================== PANEL B: PLAN (bottom drawer) ===================== -->
  <text x="440" y="74" font-size="13" font-weight="700" fill="#333">Plan &#8212; bottom drawer (tightest fit)</text>

  <!-- footprint 24 cm x 25 cm = 192 x 200 px -->
  <rect x="440" y="84" width="192" height="200" fill="#f4ecdf" stroke="#7a5c33" stroke-width="2"/>
  <text x="536" y="99" font-size="9" fill="#8a6a3a" text-anchor="middle">&#8212; wall side (back) &#8212;</text>

  <!-- ball-bearing slide strips (10 px each, just inside carcass walls) -->
  <rect x="450" y="104" width="10" height="172" fill="#d9d9d9" stroke="#888" stroke-width="0.8"/>
  <rect x="612" y="104" width="10" height="172" fill="#d9d9d9" stroke="#888" stroke-width="0.8"/>
  <text x="536" y="262" font-size="8.5" fill="#777" text-anchor="middle">grey strips = ball-bearing slides (both sides)</text>

  <!-- internal usable area (~17 x 22 cm) -->
  <rect x="466" y="104" width="140" height="172" fill="#fbf7ef" stroke="#c9b48c" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- receipts bay 8 cm x 13 cm = 64 x 104 -->
  <rect x="472" y="110" width="64" height="104" fill="#eaf2e2" stroke="#6f8f57" stroke-width="1.3"/>
  <text x="504" y="158" font-size="10" fill="#445566" text-anchor="middle">receipts</text>
  <text x="504" y="172" font-size="8.5" fill="#778899" text-anchor="middle">8 &#215; 13 cm</text>

  <!-- stamp bay 8 cm x 7 cm = 64 x 56 -->
  <rect x="540" y="110" width="64" height="56" fill="#f3e6ea" stroke="#9c5d72" stroke-width="1.3"/>
  <text x="572" y="134" font-size="10" fill="#663344" text-anchor="middle">stamps</text>
  <text x="572" y="148" font-size="8.5" fill="#996677" text-anchor="middle">8 &#215; 7 cm flat</text>
  <text x="572" y="208" font-size="8.5" fill="#aaa" text-anchor="middle">(spare)</text>

  <!-- depth dimension -->
  <line x1="648" y1="84" x2="648" y2="284" stroke="#444" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="660" y="184" font-size="10" fill="#444" text-anchor="middle" transform="rotate(90 660 184)">25 cm deep  (shelf 30 cm)</text>

  <!-- pull direction -->
  <text x="536" y="300" font-size="10" fill="#444" text-anchor="middle">&#9660; pull toward you &#9660;</text>

  <!-- ===================== CONSTRUCTION NOTES ===================== -->
  <line x1="24" y1="420" x2="796" y2="420" stroke="#ddd" stroke-width="1"/>
  <text x="24" y="438" font-size="9.5" fill="#888">Carcass: 12 mm plywood, glued dados, all cut edges sealed. Shaded bands = the 12 mm top/bottom/side panels. Drawer fronts inset with ~4 mm reveal all round.</text>
  <text x="24" y="454" font-size="9.5" fill="#888">Drawer fronts tile the full 20 cm face &#8212; no dead space. Front heights 5 / 6 / 5 cm; interior usable depth 4 / 5 / 4 cm (difference = 12 mm drawer bottom + running clearance).</text>
  <text x="24" y="470" font-size="9.5" fill="#888">Slides: 200 mm zinc-plated ball-bearing, full-extension, both sides. Load &#8776; 1 kg/drawer (&#8776; 5 kg total) &#8212; far below rating. Silica-gel packet in receipts/stamps drawer (humidity).</text>
</svg>
