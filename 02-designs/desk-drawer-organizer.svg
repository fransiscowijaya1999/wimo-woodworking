<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <!-- ================= Desk-side stationary drawer organizer ================= -->
  <!-- Scale: 8 px = 1 cm. Sits on a shelf (28 cm opening, 30 cm deep) beside work table. -->
  <!-- Build: carpentry workshop. Drawers on 200mm zinc-plated ball-bearing side slides. -->
  <rect x="0" y="0" width="700" height="400" fill="#ffffff"/>
  <text x="20" y="28" font-size="17" font-weight="700" fill="#222">Desk-side Stationary Drawer Organizer</text>
  <text x="20" y="46" font-size="12" fill="#666">External ≈ 24 cm W × 25 cm D × 20 cm H — fits 28 cm shelf opening, 30 cm deep. Scale 8 px = 1 cm.</text>

  <!-- ===================== PANEL A: FRONT ELEVATION ===================== -->
  <text x="60" y="68" font-size="13" font-weight="700" fill="#333">Front elevation</text>

  <!-- carcass outer box: 24cm x 20cm = 192 x 160 px -->
  <rect x="60" y="78" width="192" height="160" fill="#f4ecdf" stroke="#7a5c33" stroke-width="2"/>

  <!-- Drawer 1 (top, 4 cm inside) -->
  <rect x="66" y="88" width="180" height="34" rx="3" fill="#fbf7ef" stroke="#9c7b46" stroke-width="1.5"/>
  <ellipse cx="156" cy="93" rx="10" ry="2.6" fill="#cdb78f"/>
  <text x="156" y="108" font-size="9.5" fill="#555" text-anchor="middle">Drawer 1 · 4 cm</text>

  <!-- Drawer 2 (mid, 5 cm inside) -->
  <rect x="66" y="129" width="180" height="42" rx="3" fill="#fbf7ef" stroke="#9c7b46" stroke-width="1.5"/>
  <ellipse cx="156" cy="134" rx="10" ry="2.6" fill="#cdb78f"/>
  <text x="156" y="153" font-size="9.5" fill="#555" text-anchor="middle">Drawer 2 · 5 cm</text>

  <!-- Drawer 3 (bottom, 4 cm inside) -->
  <rect x="66" y="178" width="180" height="34" rx="3" fill="#fbf7ef" stroke="#9c7b46" stroke-width="1.5"/>
  <ellipse cx="156" cy="183" rx="10" ry="2.6" fill="#cdb78f"/>
  <text x="156" y="198" font-size="9.5" fill="#555" text-anchor="middle">Drawer 3 · 4 cm</text>

  <!-- total height dimension -->
  <line x1="46" y1="78" x2="46" y2="238" stroke="#444" stroke-width="1"/>
  <line x1="43" y1="78" x2="49" y2="78" stroke="#444" stroke-width="1"/>
  <line x1="43" y1="238" x2="49" y2="238" stroke="#444" stroke-width="1"/>
  <text x="40" y="158" font-size="10" fill="#444" text-anchor="middle" transform="rotate(-90 40 158)">≈ 20 cm  (shelf opening 28 cm)</text>

  <!-- width dimension -->
  <line x1="60" y1="252" x2="252" y2="252" stroke="#444" stroke-width="1"/>
  <line x1="60" y1="249" x2="60" y2="255" stroke="#444" stroke-width="1"/>
  <line x1="252" y1="249" x2="252" y2="255" stroke="#444" stroke-width="1"/>
  <text x="156" y="266" font-size="10" fill="#444" text-anchor="middle">≈ 24 cm wide  (20 cm usable + slide clearance)</text>

  <!-- contents labels -->
  <text x="78" y="300" font-size="10.5" fill="#333">D1: pens · refills · cutter · blades</text>
  <text x="78" y="316" font-size="10.5" fill="#333">D2: PH2 screwdriver · 7&quot; pliers</text>
  <text x="78" y="332" font-size="10.5" fill="#333">D3: receipts · stamps (flat)</text>

  <!-- ===================== PANEL B: PLAN (bottom drawer) ===================== -->
  <text x="410" y="68" font-size="13" font-weight="700" fill="#333">Plan — bottom drawer (tightest fit)</text>

  <!-- footprint 24cm x 25cm = 192 x 200 px -->
  <rect x="410" y="78" width="192" height="200" fill="#f4ecdf" stroke="#7a5c33" stroke-width="2"/>
  <text x="506" y="93" font-size="9" fill="#8a6a3a" text-anchor="middle">— wall side —</text>

  <!-- ball-bearing slide strips (10 px each, just inside carcass walls) -->
  <rect x="420" y="98" width="10" height="170" fill="#d9d9d9" stroke="#888" stroke-width="0.8"/>
  <rect x="582" y="98" width="10" height="170" fill="#d9d9d9" stroke="#888" stroke-width="0.8"/>
  <text x="506" y="262" font-size="8.5" fill="#777" text-anchor="middle">grey strips = ball-bearing slides (both sides)</text>

  <!-- internal usable area (~17 x 22 cm) -->
  <rect x="436" y="98" width="140" height="160" fill="#fbf7ef" stroke="#c9b48c" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- receipts bay 8cm x 13cm = 64 x 104 -->
  <rect x="442" y="104" width="64" height="104" fill="#eaf2e2" stroke="#6f8f57" stroke-width="1.3"/>
  <text x="474" y="152" font-size="10" fill="#456" text-anchor="middle">receipts</text>
  <text x="474" y="166" font-size="8.5" fill="#789" text-anchor="middle">8 × 13 cm</text>

  <!-- stamp bay 8cm x 7cm = 64 x 56 -->
  <rect x="510" y="104" width="64" height="56" fill="#f3e6ea" stroke="#9c5d72" stroke-width="1.3"/>
  <text x="542" y="128" font-size="10" fill="#634" text-anchor="middle">stamps</text>
  <text x="542" y="142" font-size="8.5" fill="#967" text-anchor="middle">8 × 7 cm flat</text>
  <text x="542" y="190" font-size="8.5" fill="#aaa" text-anchor="middle">(spare)</text>

  <!-- depth dimension -->
  <line x1="616" y1="78" x2="616" y2="278" stroke="#444" stroke-width="1"/>
  <line x1="613" y1="78" x2="619" y2="78" stroke="#444" stroke-width="1"/>
  <line x1="613" y1="278" x2="619" y2="278" stroke="#444" stroke-width="1"/>
  <text x="628" y="182" font-size="10" fill="#444" text-anchor="middle" transform="rotate(90 628 182)">≈ 25 cm deep  (shelf 30 cm)</text>

  <!-- pull direction -->
  <text x="506" y="296" font-size="10" fill="#444" text-anchor="middle">▼ pull toward you ▼</text>

  <!-- footnotes -->
  <text x="20" y="364" font-size="9.5" fill="#999">Build: carpentry workshop (clean dados + precise slide mounting feasible). Slides: 200 mm zinc-plated ball-bearing, full-extension; ~1 kg/drawer is far below rating.</text>
  <text x="20" y="380" font-size="9.5" fill="#999">Climate: seal wood + silica-gel packet in the paper/stamp drawer (Kalimantan humidity). Loaded ≈ 5 kg total — well inside the 25 kg/level budget.</text>
</svg>
