<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="sans-serif" font-size="12">
  <style>
    .box   { fill:none; stroke:#222; stroke-width:2; }
    .mat   { fill:#cfe8d8; stroke:#5a9; stroke-width:1; }
    .wood  { fill:#e8d9b5; stroke:#a98; stroke-width:1.5; }
    .steel { fill:#9aa0a6; stroke:#444; stroke-width:1; }
    .div   { stroke:#777; stroke-width:1.5; stroke-dasharray:4 3; }
    .dim   { stroke:#06c; stroke-width:1; }
    .lbl   { fill:#222; }
    .small { fill:#555; font-size:10px; }
    .title { fill:#111; font-size:14px; font-weight:bold; }
    .cap   { fill:#06c; font-size:11px; }
    .red   { fill:#c33; }
    .lead  { stroke:#999; stroke-width:0.8; }
  </style>

  <text x="40" y="24" class="title">Mobile Mechanic Tool Cart (D8) — plank bin on casters — 60 × 45 × 20 cm — 4 braced compartments — mechanic-built</text>

  <!-- ============ FRONT ELEVATION (section) ============ -->
  <g transform="translate(40,60)">
    <text x="0" y="8" class="title">Front elevation (section)</text>

    <!-- ground -->
    <line x1="-10" y1="300" x2="290" y2="300" stroke="#999" stroke-width="1"/>

    <!-- side walls (cut) -->
    <rect x="30"  y="188" width="8" height="68" class="wood"/>
    <rect x="226" y="188" width="8" height="68" class="wood"/>
    <!-- bottom plank (thickest stock) -->
    <rect x="30" y="249" width="204" height="7" class="wood"/>
    <!-- 8 mm rubber mat on the floor -->
    <rect x="38" y="245" width="188" height="4" class="mat"/>
    <text x="40" y="240" class="small">8 mm rubber mat strip per lane</text>
    <!-- cleats (bottom rests on them) -->
    <rect x="38"  y="249" width="12" height="7" class="wood" stroke="#7a5"/>
    <rect x="214" y="249" width="12" height="7" class="wood" stroke="#7a5"/>
    <text x="60" y="272" class="small">cleat strips carry the bottom in shear</text>

    <!-- 3 full-height dividers → 4 lanes A/B/C/D (run front-to-back; shown here in section) -->
    <rect x="90"  y="188" width="4" height="61" class="wood"/>
    <rect x="137" y="188" width="4" height="61" class="wood"/>
    <rect x="180" y="188" width="4" height="61" class="wood"/>
    <text x="61"  y="184" class="lbl" font-size="11">A</text>
    <text x="110" y="184" class="lbl" font-size="11">B</text>
    <text x="155" y="184" class="lbl" font-size="11">C</text>
    <text x="200" y="184" class="lbl" font-size="11">D</text>

    <!-- caster blocks -->
    <rect x="34"  y="256" width="22" height="12" class="wood"/>
    <rect x="208" y="256" width="22" height="12" class="wood"/>
    <!-- casters -->
    <circle cx="45"  cy="285" r="15" fill="#444"/>
    <circle cx="219" cy="285" r="15" fill="#444"/>
    <circle cx="45"  cy="285" r="5"  fill="#bbb"/>
    <circle cx="219" cy="285" r="5"  fill="#bbb"/>
    <text x="-6" y="316" class="small">100 mm casters: 2 rigid + 2 swivel-brake, 50 kg+ · M8 bolts into the caster blocks</text>

    <!-- rim height dim -->
    <line x1="16" y1="188" x2="16" y2="300" class="dim" marker-start="url(#a)" marker-end="url(#a)"/>
    <text x="-2" y="246" class="cap" transform="rotate(-90,-2,246)">33 cm rim (box 20 + casters 13)</text>

    <!-- box + caster sub-dims -->
    <line x1="248" y1="188" x2="248" y2="256" class="dim" marker-start="url(#a)" marker-end="url(#a)"/>
    <text x="252" y="225" class="cap">20</text>
    <line x1="248" y1="256" x2="248" y2="300" class="dim" marker-start="url(#a)" marker-end="url(#a)"/>
    <text x="252" y="282" class="cap">13</text>

    <!-- width dim -->
    <line x1="30" y1="332" x2="234" y2="332" class="dim" marker-start="url(#a)" marker-end="url(#a)"/>
    <text x="118" y="347" class="cap">60 cm</text>
  </g>

  <!-- ============ TOP PLAN ============ -->
  <g transform="translate(390,60)">
    <text x="0" y="8" class="title">Top plan — open bin (60 × 45)</text>

    <rect x="20" y="30" width="204" height="153" class="box"/>
    <rect x="24" y="34" width="196" height="145" class="mat"/>

    <!-- 3 fixed full-height dividers → 4 lanes A/B/C/D (solid = fixed) -->
    <rect x="78"  y="34" width="4" height="145" class="wood"/>
    <rect x="134" y="34" width="4" height="145" class="wood"/>
    <rect x="176" y="34" width="4" height="145" class="wood"/>

    <!-- small 90° L-brackets bracing each divider end into the front/back wall -->
    <rect x="76"  y="34"  width="8" height="7" class="steel"/>
    <rect x="76"  y="172" width="8" height="7" class="steel"/>
    <rect x="132" y="34"  width="8" height="7" class="steel"/>
    <rect x="132" y="172" width="8" height="7" class="steel"/>
    <rect x="174" y="34"  width="8" height="7" class="steel"/>
    <rect x="174" y="172" width="8" height="7" class="steel"/>

    <!-- 3-way corner bracket markers -->
    <rect x="24"  y="34"  width="9" height="9" class="red"/>
    <rect x="211" y="34"  width="9" height="9" class="red"/>
    <rect x="24"  y="170" width="9" height="9" class="red"/>
    <rect x="211" y="170" width="9" height="9" class="red"/>

    <!-- lane labels -->
    <text x="48"  y="112" class="lbl">A</text>
    <text x="104" y="112" class="lbl">B</text>
    <text x="153" y="112" class="lbl">C</text>
    <text x="196" y="112" class="lbl">D</text>

    <!-- width dim -->
    <line x1="20" y1="18" x2="224" y2="18" class="dim" marker-start="url(#a)" marker-end="url(#a)"/>
    <text x="108" y="14" class="cap">60 cm</text>
    <!-- depth dim -->
    <line x1="238" y1="30" x2="238" y2="183" class="dim" marker-start="url(#a)" marker-end="url(#a)"/>
    <text x="244" y="110" class="cap">45 cm</text>

    <text x="0" y="200" class="small">A Wrenches · B Sockets &amp; ratchets · C Screwdrivers &amp; hex · D Pliers &amp; cutters</text>
    <text x="0" y="214" class="small"><tspan fill="#9aa0a6">■</tspan> 90° L-bracket bracing each divider end · <tspan class="red">■</tspan> 3-way bracket at each bottom corner</text>
    <text x="0" y="228" class="small">4 fixed lanes, kept oversized so it's still a toss cart · loaded CG ~20 cm → slides before it tips.</text>
  </g>

  <!-- ============ 3-WAY CORNER BRACKET DETAIL ============ -->
  <g transform="translate(700,150)">
    <text x="0" y="8" class="title">Bottom corner — 3-way bracket</text>

    <!-- wood faces meeting at the inner corner C(60,110) -->
    <!-- floor -->
    <polygon points="60,110 108,134 60,158 12,134" class="wood"/>
    <!-- wall A (+x edge, up) -->
    <polygon points="60,110 108,134 108,74 60,50" class="wood"/>
    <!-- wall B (+y edge, up) -->
    <polygon points="60,110 12,134 12,74 60,50" class="wood"/>

    <!-- bracket flanges, one per face -->
    <polygon points="60,110 74,117 60,124 46,117" class="steel"/>
    <polygon points="60,110 74,117 74,99 60,92"  class="steel"/>
    <polygon points="60,110 46,117 46,99 60,92"  class="steel"/>
    <!-- screws -->
    <circle cx="60" cy="117" r="1.6" fill="#222"/>
    <circle cx="67" cy="105" r="1.6" fill="#222"/>
    <circle cx="53" cy="105" r="1.6" fill="#222"/>

    <line x1="74" y1="100" x2="150" y2="80" class="lead"/>
    <text x="120" y="74" class="small">one flange screwed</text>
    <text x="120" y="86" class="small">to each of the 3 faces</text>

    <text x="0" y="180" class="small">Two walls + the floor meet here → 3 axes.</text>
    <text x="0" y="194" class="small">A single L / flat brace can't catch the vertical axis.</text>
    <text x="0" y="208" class="small">Fallback if unavailable: 2× 90° L-bracket per corner.</text>
    <text x="0" y="222" class="small">Cleat under the floor takes the impact in shear.</text>
  </g>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L4,4 L1,7" fill="none" stroke="#06c"/>
    </marker>
  </defs>
</svg>
